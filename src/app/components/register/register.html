<div class="auth-page">
  <div class="auth-card">
    <div class="text-center">
      <img src="images/bms-logo.png" alt="BookMyShow" class="auth-logo">
      <h4 class="auth-title">Create your account</h4>
      <p class="auth-sub">Join millions of BookMyShow users</p>
    </div>

    @if (error) {
      <div class="alert alert-danger py-2 small rounded-3 mb-3">{{ error }}</div>
    }
    @if (success) {
      <div class="alert alert-success py-2 small rounded-3 mb-3">{{ success }}</div>
    }

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" [(ngModel)]="name" placeholder="John Doe">
    </div>
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control" [(ngModel)]="email" placeholder="you@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" [(ngModel)]="password" placeholder="Min. 6 characters">
    </div>
    <div class="mb-4">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-control" [(ngModel)]="confirmPassword" placeholder="••••••••">
    </div>

    <button class="btn-bms" (click)="onRegister()">Create Account</button>

    <p class="auth-footer-text">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
