<div id="bmsCarousel" class="carousel slide bms-carousel" data-bs-ride="carousel" data-bs-interval="3500">

  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#bmsCarousel" data-bs-slide-to="0" class="active" aria-current="true"></button>
    <button type="button" data-bs-target="#bmsCarousel" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#bmsCarousel" data-bs-slide-to="2"></button>
    <button type="button" data-bs-target="#bmsCarousel" data-bs-slide-to="3"></button>
  </div>

  <!-- Slides -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="images/carousel-1.png" class="d-block w-100 carousel-img" alt="Banner 1">
    </div>
    <div class="carousel-item">
      <img src="images/carousel-2.png" class="d-block w-100 carousel-img" alt="Banner 2">
    </div>
    <div class="carousel-item">
      <img src="images/carousel-3.png" class="d-block w-100 carousel-img" alt="Banner 3">
    </div>
    <div class="carousel-item">
      <img src="images/carousel-4.png" class="d-block w-100 carousel-img" alt="Banner 4">
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#bmsCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#bmsCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
